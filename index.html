    if (userData.role === 'free' && !localStorage.getItem(trialKey)) {
        showModal("🎉 Selamat! Anda mendapatkan Premium Trial 3 hari! Nikmati tanpa iklan.");
        localStorage.setItem(trialKey, Date.now());
        const expiry = new Date(); 
        expiry.setDate(expiry.getDate() + 3);
        db.ref(`users/${currentUser.uid}/role`).set('premium');
        db.ref(`users/${currentUser.uid}/premiumExpiry`).set(expiry.toISOString());
        userData.role = 'premium';
        userData.premiumExpiry = expiry.toISOString();
        updateUI();
    }

async function claimDailyBonus() {
    await showAd(async () => {
        const today = new Date().toDateString();
        if (userData.dailyBonus?.lastClaim === today) { 
            showModal("Anda sudah klaim bonus hari ini!"); 
            return; 
        }
        let streak = userData.dailyBonus?.streak || 0;
        const yesterday = new Date(); 
        yesterday.setDate(yesterday.getDate() - 1);
        if (userData.dailyBonus?.lastClaim === yesterday.toDateString()) streak++;
        else streak = 1;
        const bonus = Math.min(100 + streak * 10, 500);
        const newCoins = (userData.coins || 0) + bonus;
        await db.ref(`users/${currentUser.uid}/coins`).set(newCoins);
        await db.ref(`users/${currentUser.uid}/dailyBonus`).set({ lastClaim: today, streak: streak });
        userData.coins = newCoins;
        userData.dailyBonus = { lastClaim: today, streak: streak };
        showModal(`🎁 +${bonus} coins! (Streak: ${streak} days)`);
        if(currentPage === 'main') renderMainPage();
        if(currentPage === 'store') renderStorePage();
    });
}

async function buyUpgrade(type, price) {
    await showAd(async () => {
        if ((userData.coins || 0) < price) { 
            showModal(`❌ Koin tidak cukup! Butuh ${price} koin. Top up dulu.`); 
            return; 
        }
        const newCoins = (userData.coins || 0) - price;
        const expiry = new Date(); 
        expiry.setMonth(expiry.getMonth() + 1);
        await db.ref(`users/${currentUser.uid}/coins`).set(newCoins);
        await db.ref(`users/${currentUser.uid}/role`).set(type);
        await db.ref(`users/${currentUser.uid}/premiumExpiry`).set(expiry.toISOString());
        userData.coins = newCoins;
        userData.role = type;
        userData.premiumExpiry = expiry.toISOString();
        showModal(`✅ Selamat! Anda sekarang ${type.toUpperCase()} selama 1 bulan!`);
        if(currentPage === 'main') renderMainPage();
        if(currentPage === 'store') renderStorePage();
        updateUI();
    });
}

function addToHistory(msg) { 
    historyData.unshift(msg); 
    if (historyData.length > 200) historyData.pop(); 
    if(currentPage === 'history') renderHistoryPage(); 
}

function addNotif(msg) { 
    notifications.unshift(msg); 
    if (notifications.length > 100) notifications.pop(); 
    if(currentPage === 'notifications') renderNotificationsPage(); 
}

function updateUI() {
    const avatarEl = document.getElementById('avatarPreview');
    const nameEl = document.getElementById('profileName');
    const roleBadge = document.getElementById('roleBadge');
    if (avatarEl) { 
        if (userData.avatarUrl) avatarEl.innerHTML = `<img src="${userData.avatarUrl}">`; 
        else avatarEl.innerText = userData.displayName?.charAt(0)?.toUpperCase() || currentUser?.email?.charAt(0).toUpperCase() || '👤'; 
    }
    if (nameEl) nameEl.innerText = userData.displayName || currentUser?.email?.split('@')[0] || 'User';

        roleBadge.innerText = userData.role.toUpperCase(); 
        roleBadge.className = `badge-role ${userData.role === 'premium' ? 'badge-premium' : (userData.role === 'vip' ? 'badge-vip' : '')}`;

function addTerminalLine(text, isError = false) { 
    const c = document.getElementById('termDisplay'); 
    if (c) { 
        const d = document.createElement('div'); 
        d.className = 'terminal-line'; 
        d.style.color = isError ? '#f87171' : '#cbd5e1'; 
        d.innerHTML = text; 
        c.appendChild(d); 
        c.scrollTop = c.scrollHeight; 
        terminalLogs.push(text); 
    } 
}

function executeCommand(cmd) {
    const low = cmd.toLowerCase().trim();
    addTerminalLine(`<span style="color:#3b82f6;">$</span> ${cmd}`);
    addToHistory(`Command: ${cmd}`);
    
    if (linkUrls[low]) {
        if (linkControls[low] === false) { 
            addTerminalLine(`❌ Akses ditolak! Link ${low} dinonaktifkan Admin.`, true); 
            return; 
        }
        if (low === "/web-multifungsi-v2") { 
            const pwd = prompt("Password:"); 
            if (pwd === "RADIT GANTENG SEKALI") window.open(linkUrls[low]); 
            else addTerminalLine(`❌ Password salah!`, true); 
        } else window.open(linkUrls[low]);
        return;
    }
    
    if (low === '/clear') { 
        const c = document.getElementById('termDisplay'); 
        if (c) c.innerHTML = ''; 
        terminalLogs = []; 
        addTerminalLine(`Terminal cleared`); 
    }
    else if (low === '/help') addTerminalLine(`📋 Commands (${allCommands.length}): ${allCommands.join(', ')}`);
    else if (low === '/info') addTerminalLine(`📱 User: ${currentUser?.email} | Role: ${userData.role} | Coins: ${userData.coins}`);
    else if (low === '/time') addTerminalLine(`🕐 ${new Date().toLocaleTimeString()}`);
    else if (low === '/date') addTerminalLine(`📅 ${new Date().toLocaleDateString()}`);
    else if (low === '/weather') addTerminalLine(`🌤️ Jakarta: 28°C, Cloudy | Humidity: 65%`);
    else if (low === '/calc') { 
        const ex = prompt('Calculation:'); 
        if (ex) { 
            try { 
                addTerminalLine(`🧮 ${ex} = ${eval(ex)}`); 
            } catch(e) { 
                addTerminalLine(`Error`, true); 
            } 
        } 
    }
    else if (low === '/password') addTerminalLine(`🔑 ${Math.random().toString(36).substr(2, 12)}`);
    else if (low === '/notes') { 
        const n = prompt('Note:'); 
        if (n) { 
            localStorage.setItem('note', n); 
            addTerminalLine(`📝 Saved`); 
        } 
    }
    else if (low === '/todo') { 
        let t = JSON.parse(localStorage.getItem('todos') || '[]'); 
        const a = prompt('add/list/del'); 
        if (a === 'add') { 
            const task = prompt('Task:'); 
            if (task) { 
                t.push({ task }); 
                localStorage.setItem('todos', JSON.stringify(t)); 
                addTerminalLine(`✅ Added`); 
            } 
        } else if (a === 'list') { 
            if (t.length === 0) addTerminalLine(`No tasks`); 
            else t.forEach((task, i) => addTerminalLine(`${i+1}. ${task.task}`)); 
        } else if (a === 'del') { 
            const idx = prompt('Number:'); 
            if (idx && t[parseInt(idx)-1]) { 
                t.splice(parseInt(idx)-1, 1); 
                localStorage.setItem('todos', JSON.stringify(t)); 
                addTerminalLine(`🗑️ Deleted`); 
            } 
        } 
    }
    else if (low === '/bmi') { 
        const w = prompt('Weight(kg):'), h = prompt('Height(cm):'); 
        if (w && h) { 
            const bmi = w / ((h/100)**2); 
            addTerminalLine(`📊 BMI: ${bmi.toFixed(1)} - ${bmi<18.5?'Underweight':bmi<25?'Normal':bmi<30?'Overweight':'Obese'}`); 
        } 
    }
    else if (low === '/random') { 
        const min = prompt('Min:','1'), max = prompt('Max:','100'); 
        if (min && max) addTerminalLine(`🎲 ${Math.floor(Math.random()*(parseInt(max)-parseInt(min)+1))+parseInt(min)}`); 
    }
    else if (low === '/fact') { 
        const facts = ['Honey never spoils', 'Octopuses have 3 hearts', 'Bananas are berries', 'A day on Venus is longer than a year', 'Bats are the only flying mammals']; 
        addTerminalLine(`📖 ${facts[Math.floor(Math.random()*facts.length)]}`); 
    }
    else if (low === '/joke') { 
        const jokes = ['Why did the scarecrow win? He was outstanding!', 'Why don\'t scientists trust atoms? They make up everything!', 'What do you call a bear with no teeth? Gummy bear!']; 
        addTerminalLine(`😂 ${jokes[Math.floor(Math.random()*jokes.length)]}`); 
    }
    else if (low === '/quote') { 
        const quotes = ['Code is poetry', 'Stay hungry, stay foolish', 'Believe you can and you\'re halfway there']; 
        addTerminalLine(`💬 ${quotes[Math.floor(Math.random()*quotes.length)]}`); 
    }
    else if (low === '/age') { 
        const y = prompt('Birth year:'); 
        if (y) addTerminalLine(`🎂 Age: ${new Date().getFullYear()-parseInt(y)}`); 
    }
    else if (low === '/discount') { 
        const p = prompt('Price:'), d = prompt('Discount %:'); 
        if (p && d) addTerminalLine(`🏷️ Final: ${p*(1-d/100)}`); 
    }
    else if (low === '/loan') { 
        const amt = prompt('Amount:'), rate = prompt('Interest %:'), years = prompt('Years:'); 
        if (amt && rate && years) addTerminalLine(`💰 Total: ${parseFloat(amt)*Math.pow(1+parseFloat(rate)/100, parseFloat(years)).toFixed(0)}`); 
    }
    else if (low === '/currency') addTerminalLine(`💱 1 USD = 15000 IDR | 1 EUR = 16500 IDR`);
    else if (low === '/stopwatch') addTerminalLine(`⏱️ Stopwatch started!`);
    else if (low === '/countdown') { 
        const sec = prompt('Seconds:'); 
        if (sec) addTerminalLine(`⏳ Countdown ${sec}s started!`); 
    }
    else if (low === '/tip') { 
        const bill = prompt('Bill:'), tip = prompt('Tip %:'); 
        if (bill && tip) addTerminalLine(`💵 Tip: ${bill*tip/100}, Total: ${bill*(1+tip/100)}`); 
    }
    else if (low === '/covid') addTerminalLine(`🦠 Global Cases: 700M+ (simulated)`);
    else if (low === '/news') addTerminalLine(`📰 RAXZYYZ v18.0 Released! Group Chat added!`);
    else if (low === '/qr') addTerminalLine(`📱 QR Code generated for RAXZYYZ`);
    else if (low === '/color') { 
        const c = prompt('Color:'); 
        if (c) addTerminalLine(`🎨 Color: ${c}`); 
    }
    else if (low === '/unit') addTerminalLine(`📏 1 km = 0.621 miles | 1 kg = 2.205 lbs`);
    else if (low === '/echo') { 
        const msg = prompt('Message:'); 
        if (msg) addTerminalLine(`🔊 ${msg}`); 
    }
    else if (low === '/ping') addTerminalLine(`🏓 Pong! ${Math.floor(Math.random()*100)}ms`);
    else if (low === '/ip') addTerminalLine(`🌐 IP: 192.168.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`);
    else if (low === '/uptime') addTerminalLine(`⏰ System uptime: ${Math.floor(Math.random()*24)}h ${Math.floor(Math.random()*60)}m`);
    else if (low === '/math') addTerminalLine(`🧮 sin(30)=0.5, cos(60)=0.5, tan(45)=1`);
    else if (low === '/sqrt') { 
        const n = prompt('Number:'); 
        if (n) addTerminalLine(`√${n} = ${Math.sqrt(parseFloat(n)).toFixed(2)}`); 
    }
    else if (low === '/power') { 
        const b = prompt('Base:'), e = prompt('Exponent:'); 
        if (b && e) addTerminalLine(`${b}^${e} = ${Math.pow(parseFloat(b), parseFloat(e)).toFixed(2)}`);

    }
    else if (low === '/cos') { 
        const d = prompt('Degrees:'); 
        if (d) addTerminalLine(`cos(${d}°) = ${Math.cos(d * Math.PI / 180).toFixed(4)}`); 
    }
    else if (low === '/tan') { 
        const d = prompt('Degrees:'); 
        if (d) addTerminalLine(`tan(${d}°) = ${Math.tan(d * Math.PI / 180).toFixed(4)}`); 
    }
    else if (low === '/log') { 
        const n = prompt('Number:'); 
        if (n) addTerminalLine(`log10(${n}) = ${Math.log10(parseFloat(n)).toFixed(4)}`); 
    }
    else if (low === '/ln') { 
        const n = prompt('Number:'); 
        if (n) addTerminalLine(`ln(${n}) = ${Math.log(parseFloat(n)).toFixed(4)}`); 
    }
    else if (low === '/pi') addTerminalLine(`π = 3.141592653589793`);
    else if (low === '/e') addTerminalLine(`e = 2.718281828459045`);
    else if (low === '/binary') { 
        const n = prompt('Number:'); 
        if (n) addTerminalLine(`🔢 ${n} in binary: ${parseInt(n).toString(2)}`); 
    }
    else if (low === '/hex') { 
        const n = prompt('Number:'); 
        if (n) addTerminalLine(`🔢 ${n} in hex: ${parseInt(n).toString(16).toUpperCase()}`); 
    }
    else if (low === '/rgb') { 
        const r = prompt('Red (0-255):'), g = prompt('Green (0-255):'), b = prompt('Blue (0-255):'); 
        if (r && g && b) addTerminalLine(`🎨 RGB(${r},${g},${b}) = #${parseInt(r).toString(16)}${parseInt(g).toString(16)}${parseInt(b).toString(16)}`); 
    }
    else if (low === '/cmyk') addTerminalLine(`🎨 CMYK converter: (simulated)`);
    else addTerminalLine(`❌ Unknown: "${cmd}". Type /help`, true);
}

function renderTicTacToe() {
    tttBoard = Array(9).fill(''); tttPlayer = 'X'; tttActive = true;
    function checkWinner() { 
        const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]; 
        for (let w of wins) if (tttBoard[w[0]] && tttBoard[w[0]] === tttBoard[w[1]] && tttBoard[w[0]] === tttBoard[w[2]]) return tttBoard[w[0]]; 
        return null; 
    }
    function render() {
        document.getElementById('dynamicContent').innerHTML = `<div class="section-card"><div class="section-header"><h3>TIC TAC TOE</h3></div><div class="section-content"><div class="ttt-board" id="tttBoard"></div><div id="tttStatus" style="text-align:center;margin-top:16px;">Player X turn</div><button id="tttReset" class="btn-primary" style="margin-top:16px;">Reset</button><button id="backBtn" class="btn-secondary" style="margin-top:12px;">Back to Games</button></div></div>`;
        const boardDiv = document.getElementById('tttBoard');
        for (let i = 0; i < 9; i++) { 
            const cell = document.createElement('div'); 
            cell.className = 'ttt-cell'; 
            cell.innerText = tttBoard[i]; 
            cell.onclick = () => { 
                if (tttActive && tttBoard[i] === '') { 
                    tttBoard[i] = tttPlayer; 
                    cell.innerText = tttPlayer; 
                    const winner = checkWinner(); 
                    if (winner) { 
                        document.getElementById('tttStatus').innerText = `Player ${winner} wins!`; 
                        tttActive = false; 
                        addToHistory(`TicTacToe: ${winner} won`); 
                    } else if (tttBoard.every(c => c !== '')) { 
                        document.getElementById('tttStatus').innerText = 'Draw!'; 
                        tttActive = false; 
                    } else { 
                        tttPlayer = tttPlayer === 'X' ? 'O' : 'X';

function renderMemoryGame() {
    const emojis = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
    let cards = [...emojis, ...emojis];
    for (let i = cards.length - 1; i > 0; i--) { 
        const j = Math.floor(Math.random() * (i + 1)); 
        [cards[i], cards[j]] = [cards[j], cards[i]]; 
    }
    memCards = cards; memFlipped = Array(16).fill(false); memMatched = Array(16).fill(false); memFirst = null; memSecond = null; memLock = false;
    function render() {
        document.getElementById('dynamicContent').innerHTML = `<div class="section-card"><div class="section-header"><h3>MEMORY MATCH</h3></div><div class="section-content"><div class="memory-grid" id="memGrid"></div><button id="memReset" class="btn-primary" style="margin-top:16px;">Reset</button><button id="backBtn" class="btn-secondary" style="margin-top:12px;">Back to Games</button></div></div>`;
        const grid = document.getElementById('memGrid');
        for (let i = 0; i < 16; i++) { 
            const card = document.createElement('div'); 
            card.className = 'memory-card'; 
            if (memMatched[i]) { 
                card.innerText = memCards[i]; 
                card.style.opacity = '0.5'; 
            } else if (memFlipped[i] || memFirst === i || memSecond === i) { 
                card.innerText = memCards[i]; 
            } else { 
                card.innerText = '?'; 
            } 
            card.onclick = () => { 
                if (memLock || memMatched[i] || memSecond !== null) return; 
                if (memFirst === null) { 
                    memFlipped[i] = true; 
                    memFirst = i; 
                    render(); 
                } else if (memSecond === null && memFirst !== i) { 
                    memFlipped[i] = true; 
                    memSecond = i; 
                    render(); 
                    if (memCards[memFirst] === memCards[memSecond]) { 
                        memMatched[memFirst] = true; 
                        memMatched[memSecond] = true; 
                        memFirst = null; 
                        memSecond = null; 
                        memFlipped = Array(16).fill(false); 
                        if (memMatched.every(m => m === true)) { 
                            showModal('🎉 You won!'); 
                            addToHistory('Memory Game completed!'); 
                        } 
                        render(); 
                    } else { 
                        memLock = true; 
                        setTimeout(() => { 
                            memFlipped[memFirst] = false; 
                            memFlipped[memSecond] = false; 
                            memFirst = null; 
                            memSecond = null; 
                            memLock = false; 
                            render(); 
                        }, 800); 
                    } 
                } 
            }; 
            grid.appendChild(card); 
        }
        document.getElementById('memReset')?.addEventListener('click', () => renderMemoryGame());
        document.getElementById('backBtn')?.addEventListener('click', () => renderGamesPage());
    }
    render();
}

function initSnakeBoard() {
    snakeBoard = Array(15).fill().map(() => Array(15).fill(0));
    for (let i = 0; i < 15; i++) for (let j = 0; j < 15; j++) snakeBoard[i][j] = 0;
    snakeBoard[7][7] = 1; snakeBoard[7][6] = 1; snakeBoard[7][5] = 1;
    snakeX = 7; snakeY = 7; snakeDir = 'RIGHT'; snakeScore = 0; snakeGameActive = true;
    do { foodX = Math.floor(Math.random() * 15); foodY = Math.floor(Math.random() * 15); } while (snakeBoard[foodX][foodY] === 1);
    snakeBoard[foodX][foodY] = 2;
}

function renderSnakeGame() {
    initSnakeBoard();
    function renderBoard() {
        let html = `<div class="section-card"><div class="section-header"><h3>SNAKE GAME</h3></div><div class="section-content"><div class="snake-board" id="snakeBoard">`;
        for (let i = 0; i < 15; i++) { 
            for (let j = 0; j < 15; j++) { 
                let cls = 'snake-cell'; 
                if (snakeBoard[i][j] === 1) cls += ' snake'; 
                else if (snakeBoard[i][j] === 2) cls += ' food'; 
                html += `<div class="${cls}"></div>`; 
            } 
        }
        html += `</div><div style="text-align:center;margin-top:16px;">Score: <span id="snakeScore">${snakeScore}</span></div><button id="snakeReset" class="btn-primary" style="margin-top:16px;">Reset Game</button><button id="backBtn" class="btn-secondary" style="margin-top:12px;">Back to Games</button></div></div>`;
        document.getElementById('dynamicContent').innerHTML = html;
        document.getElementById('snakeReset')?.addEventListener('click', () => renderSnakeGame());
        document.getElementById('backBtn')?.addEventListener('click', () => renderGamesPage());
    }
    function moveSnake() {
        if (!snakeGameActive) return;
        let nx = snakeX, ny = snakeY;
        if (snakeDir === 'UP') nx--; else if (snakeDir === 'DOWN') nx++; else if (snakeDir === 'LEFT') ny--; else if (snakeDir === 'RIGHT') ny++;
        if (nx < 0 || nx >= 15 || ny < 0 || ny >= 15 || snakeBoard[nx][ny] === 1) { 
            snakeGameActive = false; 
            showModal(`Game Over! Score: ${snakeScore}`); 
            addToHistory(`Snake Game Over! Score: ${snakeScore}`); 
            renderBoard(); 
            return; 
        }
        if (snakeBoard[nx][ny] === 2) { 
            snakeScore++; 
            snakeBoard[snakeX][snakeY] = 1; 
            snakeX = nx; 
            snakeY = ny; 
            snakeBoard[snakeX][snakeY] = 1; 
            do { foodX = Math.floor(Math.random() * 15); foodY = Math.floor(Math.random() * 15); } while (snakeBoard[foodX][foodY] === 1); 
            snakeBoard[foodX][foodY] = 2; 
        } else { 
            let tx = -1, ty = -1; 
            for (let i = 0; i < 15; i++) for (let j = 0; j < 15; j++) if (snakeBoard[i][j] === 1 && (i !== snakeX || j !== snakeY)) { tx = i; ty = j; } 
            snakeBoard[snakeX][snakeY] = 1; 
            snakeX = nx; 
            snakeY = ny; 
            snakeBoard[snakeX][snakeY] = 1; 
            if (tx !== -1 && (tx !== snakeX || ty !== snakeY)) snakeBoard[tx][ty] = 0; 
        }
        renderBoard();
    }
    renderBoard();
    const handleKey = (e) => { 
        if (e.key === 'ArrowUp' && snakeDir !== 'DOWN') snakeDir = 'UP'; 
        else if (e.key === 'ArrowDown' && snakeDir !== 'UP') snakeDir = 'DOWN'; 
        else if (e.key === 'ArrowLeft' && snakeDir !== 'RIGHT') snakeDir = 'LEFT'; 
        else if (e.key === 'ArrowRight' && snakeDir !== 'LEFT') snakeDir = 'RIGHT'; 
        moveSnake(); 
    };
    window.removeEventListener('keydown', handleKey); 
    window.addEventListener('keydown', handleKey);
    const interval = setInterval(() => { 
        if (currentPage === 'snake') moveSnake(); 
        else clearInterval(interval); 
    }, 200);
}

    const games = ['Tic Tac Toe', 'Guess Number', 'Memory Match'];

            <button id="logoutBtn" class="btn-secondary" style="background:rgba(239,68,68,0.2);border-color:#ef4444;color:#ef4444;">Logout</button>
        </div></div>
    `;
    document.getElementById('logoutBtn')?.addEventListener('click', () => auth.signOut().then(() => location.reload()));
    document.getElementById('themeToggle')?.addEventListener('click', () => document.body.classList.toggle('light'));
    document.getElementById('toggleGod')?.addEventListener('click', () => { 
        if (isGodMode) { 
            isGodMode = false; 
            document.getElementById('godPanel').style.display = 'none'; 
        } else { 
            const pwd = prompt("Enter GOD Mode password:"); 
            if (pwd === GOD_PASSWORD) { 
                isGodMode = true; 
                renderGodPanel(); 
                document.getElementById('godPanel').style.display = 'block'; 
                showModal("GOD Mode ON"); 
            } else showModal("Wrong password!"); 
        } 
    });
}

// ============================================ //
// ========== PAGE NAVIGATION ================= //
// ============================================ //
function switchPage(page) {
    currentPage = page;
    document.querySelectorAll('.nav-item').forEach(n => { 
        n.classList.remove('active'); 
        if (n.dataset.page === page) n.classList.add('active'); 
    });
    if (page === 'main') renderMainPage();
    else if (page === 'chat') renderChatPage();
    else if (page === 'terminal') renderTerminalPage();
    else if (page === 'ai') renderAIPage();
    else if (page === 'tools') renderToolsPage();
    else if (page === 'games') renderGamesPage();
    else if (page === 'snake') renderSnakeGame();
    else if (page === 'store') renderStorePage();
    else if (page === 'history') renderHistoryPage();
    else if (page === 'notifications') renderNotificationsPage();
    else if (page === 'profile') renderProfilePage();
    else if (page === 'settings') renderSettingsPage();
    addToHistory(`Navigated to ${page}`);
}

document.querySelectorAll('.nav-item').forEach(n => n.addEventListener('click', () => switchPage(n.dataset.page)));

// ============================================ //
// ========== AUTH STATE LISTENER ============= //
// ============================================ //
auth.onAuthStateChanged(async (user) => {
    if (user) {
        currentUser = user;
        const snap = await db.ref(`users/${user.uid}`).once('value');
        const data = snap.val();
        if (data) {
            userData = { 
                role: data.role || 'free', 
                displayName: data.displayName || '', 
                avatarUrl: data.avatarUrl || '', 
                bannerUrl: data.bannerUrl || '', 
                coins: data.coins || 1000, 
                dailyBonus: data.dailyBonus || { lastClaim: '', streak: 0 }, 
                premiumExpiry: data.premiumExpiry || null 
            };
        } else {
            userData = { 
                role: 'free', 
                displayName: '', 
                avatarUrl: '', 
                bannerUrl: '', 
                coins: 1000, 
                dailyBonus: { lastClaim: '', streak: 0 }, 
                premiumExpiry: null 
            };
            await db.ref(`users/${user.uid}`).set({ 
                email: user.email, 
                role: 'free', 
                coins: 1000, 
                createdAt: Date.now() 
            });
        }
        checkPremiumTrial();
        updateUI();
        document.getElementById('bottomNav').style.display = 'flex';
        renderMainPage();
        document.getElementById('profileBtn')?.addEventListener('click', () => switchPage('profile'));
        db.ref('raxzy/link_controls').once('value', (snap) => { 
            const lc = snap.val(); 
            if (lc) Object.assign(linkControls, lc); 
        });
    } else {
        document.getElementById('bottomNav').style.display = 'none';
        document.getElementById('dynamicContent').innerHTML = `
            <div class="section-card"><div class="section-header"><h3>LOGIN / SIGN UP</h3></div>
            <div class="section-content" style="text-align:center;padding:20px;">
                <button id="googleLogin" class="btn-primary" style="margin-bottom:12px;"><i class="fab fa-google"></i> Login with Google</button>
                <div style="margin:20px 0;color:#5a7d9a;">━━━━ atau ━━━━</div>
                <input type="email" id="loginEmail" class="input-field" placeholder="Email">
                <input type="password" id="loginPassword" class="input-field" placeholder="Password">
                <button id="emailLogin" class="btn-primary">Login</button>
                <button id="goToRegister" class="btn-secondary" style="margin-top:12px;">Daftar Akun Baru</button>
            </div></div>
        `;
        document.getElementById('googleLogin')?.addEventListener('click', () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()));
        document.getElementById('emailLogin')?.addEventListener('click', () => { 
            const e = document.getElementById('loginEmail').value, p = document.getElementById('loginPassword').value; 
          auth.signInWithEmailAndPassword(e, p).catch(e => showModal(e.message)); 
        });
        document.getElementById('goToRegister')?.addEventListener('click', () => {
            document.getElementById('dynamicContent').innerHTML = `
                <div class="section-card"><div class="section-header"><h3>REGISTER</h3></div>
                <div class="section-content" style="text-align:center;padding:20px;">
                    <input type="email" id="regEmail" class="input-field" placeholder="Email">
                    <input type="password" id="regPassword" class="input-field" placeholder="Password (min 6)">
                    <button id="doRegister" class="btn-primary">Daftar</button>
                    <button id="backToLogin" class="btn-secondary" style="margin-top:12px;">Kembali ke Login</button>
                </div></div>
            `;
            document.getElementById('doRegister')?.addEventListener('click', () => { 
                const e = document.getElementById('regEmail').value, p = document.getElementById('regPassword').value; 
                auth.createUserWithEmailAndPassword(e, p).then((uc) => { 
                    db.ref(`users/${uc.user.uid}`).set({ email: e, role: 'free', coins: 1000 }); 
                    location.reload(); 
                }).catch(e => showModal(e.message)); 
            });
            document.getElementById('backToLogin')?.addEventListener('click', () => location.reload());
        });
    }
});
